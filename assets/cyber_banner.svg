<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&amp;display=swap');
    .title { font: 900 48px 'Inter', sans-serif; fill: #00d2ff; filter: drop-shadow(0 0 10px #00d2ff); }
    .subtitle { font: 600 18px 'Inter', sans-serif; fill: #94a3b8; }
  </style>
  
  <!-- Background -->
  <rect width="1000" height="300" fill="#050a14" />
  
  <!-- Animated Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0, 210, 255, 0.1)" stroke-width="1" />
    </pattern>
  </defs>
  
  <rect width="1000" height="300" fill="url(#grid)">
    <animateTransform attributeName="transform" type="translate" from="0 -40" to="0 0" dur="2s" repeatCount="indefinite" />
  </rect>

  <!-- Glowing Particles -->
  <circle cx="20%" cy="30%" r="2" fill="#00d2ff">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" />
    <animate attributeName="cy" values="30%;25%;30%" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="80%" cy="70%" r="3" fill="#ff0055">
    <animate attributeName="opacity" values="0.1;0.6;0.1" dur="5s" repeatCount="indefinite" />
    <animate attributeName="cy" values="70%;75%;70%" dur="6s" repeatCount="indefinite" />
  </circle>
  <circle cx="50%" cy="20%" r="1" fill="#fff">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Scanning Line -->
  <rect x="0" y="0" width="1000" height="2" fill="rgba(0, 210, 255, 0.3)">
    <animate attributeName="y" from="-10" to="310" dur="4s" repeatCount="indefinite" />
  </rect>

  <!-- Text Content -->
  <text x="50%" y="150" text-anchor="middle" class="title">
    ISABELA PAIVA
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite" />
  </text>
  <text x="50%" y="190" text-anchor="middle" class="subtitle">
    FULL STACK DEVELOPER | CYBERSECURITY ENTHUSIAST
  </text>

  <!-- Decorative Lines -->
  <path d="M 400 220 L 600 220" stroke="#00d2ff" stroke-width="2" stroke-dasharray="200">
    <animate attributeName="stroke-dashoffset" from="400" to="0" dur="3s" repeatCount="indefinite" />
  </path>
</svg>
