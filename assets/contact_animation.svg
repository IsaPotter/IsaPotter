<svg width="1000" height="100" viewBox="0 0 1000 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@800&amp;display=swap');
    .text { font: 800 32px 'Inter', sans-serif; fill: #00d2ff; letter-spacing: 4px; }
    .line { stroke: #00d2ff; stroke-width: 2; opacity: 0.3; }
    .dot { fill: #00d2ff; }
  </style>

  <!-- Animated Lines -->
  <path d="M 0 50 L 350 50" class="line" />
  <path d="M 650 50 L 1000 50" class="line" />
  
  <circle cx="350" cy="50" r="4" class="dot">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="650" cy="50" r="4" class="dot">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Glowing Text -->
  <text x="50%" y="60" text-anchor="middle" class="text">
    VAMOS CONVERSAR?
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" />
  </text>
  
  <!-- Scanning Light on text -->
  <rect x="350" y="30" width="300" height="40" fill="url(#grad)" opacity="0.5">
    <animate attributeName="x" from="200" to="500" dur="3s" repeatCount="indefinite" />
  </rect>
  
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="transparent" />
      <stop offset="50%" stopColor="#00d2ff" />
      <stop offset="100%" stopColor="transparent" />
    </linearGradient>
  </defs>
</svg>
